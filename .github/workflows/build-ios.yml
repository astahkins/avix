name: Build Avix iOS

# Запускать сборку при push в основную ветку.
on:
  push:
    branches:
      - main

jobs:
  build-ios:
    name: Build IPA
    runs-on: macos-latest

    steps:
      # Клонирует репозиторий в рабочую папку GitHub Actions.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливает Flutter SDK.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Проверяет установленную версию Flutter.
      - name: Flutter doctor
        run: flutter doctor -v

      # Создаёт iOS-платформу, если папка ios/ ещё не добавлена в репозиторий.
      - name: Create iOS platform if missing
        run: |
          if [ ! -d "ios" ]; then
            flutter create --platforms=ios .
          fi

      # Очищает проект.
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # Собирает IPA в release-режиме.
      - name: Build IPA
        run: flutter build ipa --release --export-method development

      # Сохраняет IPA как артефакт GitHub Actions.
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: avix-ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
