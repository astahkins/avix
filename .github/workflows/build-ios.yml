name: Build Avix iOS

# Запускать сборку при push в основную ветку.
on:
  push:
    branches:
      - main

jobs:
  build-ios:
    name: Build IPA
    runs-on: macos-latest

    steps:
      # Клонирует репозиторий в рабочую папку GitHub Actions.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Устанавливает Flutter SDK.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Проверяет установленную версию Flutter.
      - name: Flutter doctor
        run: flutter doctor -v

      # Очищает проект и устанавливает зависимости.
      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get

      # Создаёт exportOptions.plist, если его нет в ios/.
      # APPLE_TEAM_ID можно задать в GitHub Secrets.
      - name: Create exportOptions.plist if missing
        shell: bash
        run: |
          if [ ! -f "ios/exportOptions.plist" ]; then
            cat > ios/exportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          fi

      # Собирает IPA в release-режиме.
      - name: Build IPA
        run: flutter build ipa --release --export-options-plist ios/exportOptions.plist

      # Сохраняет IPA как артефакт GitHub Actions.
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: avix-ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
